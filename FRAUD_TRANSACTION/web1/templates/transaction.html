<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Money - Fraud Watch</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --success-color: #06ffa5;
            --danger-color: #ff006e;
            --warning-color: #ffbe0b;
            --dark-color: #2b2d42;
            --light-color: #f8f9fa;
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated Background */
        .bg-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            overflow: hidden;
        }
        
        .bg-animation span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            animation: move 25s linear infinite;
            bottom: -150px;
        }
        
        .bg-animation span:nth-child(1) {
            left: 25%;
            width: 80px;
            height: 80px;
            animation-delay: 0s;
        }
        
        .bg-animation span:nth-child(2) {
            left: 10%;
            width: 20px;
            height: 20px;
            animation-delay: 2s;
            animation-duration: 12s;
        }
        
        .bg-animation span:nth-child(3) {
            left: 70%;
            width: 20px;
            height: 20px;
            animation-delay: 4s;
        }
        
        .bg-animation span:nth-child(4) {
            left: 40%;
            width: 60px;
            height: 60px;
            animation-delay: 0s;
            animation-duration: 18s;
        }
        
        .bg-animation span:nth-child(5) {
            left: 65%;
            width: 20px;
            height: 20px;
            animation-delay: 0s;
        }
        
        .bg-animation span:nth-child(6) {
            left: 75%;
            width: 110px;
            height: 110px;
            animation-delay: 3s;
        }
        
        .bg-animation span:nth-child(7) {
            left: 35%;
            width: 150px;
            height: 150px;
            animation-delay: 7s;
        }
        
        .bg-animation span:nth-child(8) {
            left: 50%;
            width: 25px;
            height: 25px;
            animation-delay: 15s;
            animation-duration: 45s;
        }
        
        .bg-animation span:nth-child(9) {
            left: 20%;
            width: 15px;
            height: 15px;
            animation-delay: 2s;
            animation-duration: 35s;
        }
        
        .bg-animation span:nth-child(10) {
            left: 85%;
            width: 150px;
            height: 150px;
            animation-delay: 0s;
            animation-duration: 11s;
        }
        
        @keyframes move {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
                border-radius: 0;
            }
            100% {
                transform: translateY(-1000px) rotate(720deg);
                opacity: 0;
                border-radius: 50%;
            }
        }
        
        /* Sidebar Navigation */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 280px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            transition: all 0.3s ease;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 30px 20px;
            background: var(--gradient);
            color: white;
            text-align: center;
        }
        
        .sidebar-header h3 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .sidebar-menu {
            padding: 20px 0;
        }
        
        .sidebar-item {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            color: var(--dark-color);
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }
        
        .sidebar-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            background: var(--gradient);
            transition: all 0.3s ease;
            z-index: -1;
        }
        
        .sidebar-item:hover::before,
        .sidebar-item.active::before {
            width: 100%;
        }
        
        .sidebar-item:hover,
        .sidebar-item.active {
            color: white;
            padding-left: 35px;
        }
        
        .sidebar-item i {
            font-size: 20px;
            margin-right: 15px;
            width: 25px;
            text-align: center;
        }
        
        .sidebar-divider {
            height: 1px;
            background: rgba(0, 0, 0, 0.1);
            margin: 15px 25px;
        }
        
        /* Mobile Menu Toggle */
        .mobile-menu-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }
        
        .mobile-menu-toggle:hover {
            transform: scale(1.1);
            background: var(--secondary-color);
        }
        
        /* Main Content */
        .main-content {
            margin-left: 280px;
            min-height: 100vh;
            padding: 0;
            transition: all 0.3s ease;
        }
        
        /* Top Navigation */
        .top-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--dark-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .page-title i {
            color: var(--primary-color);
            font-size: 32px;
        }
        
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .notification-btn {
            position: relative;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--dark-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .notification-btn:hover {
            color: var(--primary-color);
            transform: scale(1.1);
        }
        
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger-color);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
        }
        
        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .user-avatar:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        /* Send Money Container */
        .send-money-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 0 20px;
        }
        
        .send-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card-header-custom {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .card-header-custom h2 {
            font-size: 32px;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .card-header-custom p {
            color: #6c757d;
            font-size: 16px;
            margin: 0;
        }
        
        /* Alert Messages */
        .alert-custom {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            animation: slideInRight 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }
        
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .alert-custom::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 5px;
        }
        
        .alert-custom.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .alert-custom.success::before {
            background: var(--success-color);
        }
        
        .alert-custom.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .alert-custom.error::before {
            background: var(--danger-color);
        }
        
        .alert-custom.info {
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary-color);
            border: 1px solid rgba(37, 99, 235, 0.2);
        }
        
        .alert-custom.info::before {
            background: var(--primary-color);
        }
        
        .alert-custom i {
            font-size: 24px;
        }
        
        .alert-custom .alert-content {
            flex: 1;
        }
        
        .alert-custom .alert-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.3s ease;
        }
        
        .alert-custom .alert-close:hover {
            opacity: 1;
        }
        
        /* Form Styles */
        .form-group-custom {
            margin-bottom: 25px;
            position: relative;
        }
        
        .form-group-custom label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--dark-color);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-group-custom label i {
            margin-right: 8px;
            color: var(--primary-color);
        }
        
        .input-group-custom {
            position: relative;
        }
        
        .input-group-custom i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #6c757d;
            z-index: 1;
        }
        
        .form-control-custom {
            width: 100%;
            padding: 15px 20px 15px 55px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
        }
        
        .form-control-custom:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(67, 97, 238, 0.1);
            transform: translateY(-2px);
        }
        
        .form-control-custom::placeholder {
            color: #adb5bd;
        }
        
        /* Quick Amount Buttons */
        .quick-amounts {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .quick-amount-btn {
            padding: 8px 16px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .quick-amount-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.2);
        }
        
        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            margin-top: 30px;
        }
        
        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.5s ease;
        }
        
        .submit-btn:hover::before {
            left: 100%;
        }
        
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(67, 97, 238, 0.4);
        }
        
        .submit-btn:active {
            transform: translateY(-1px);
        }
        
        .submit-btn i {
            margin-right: 10px;
        }
        
        /* Back Button */
        .back-btn-custom {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: white;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 30px;
        }
        
        .back-btn-custom:hover {
            background: var(--primary-color);
            color: white;
            transform: translateX(-5px);
            box-shadow: 0 5px 20px rgba(67, 97, 238, 0.3);
            text-decoration: none;
        }
        
        /* Recent Transactions */
        .recent-transactions {
            margin-top: 50px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }
        
        .recent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .recent-header h3 {
            font-size: 24px;
            font-weight: 700;
            color: var(--dark-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            background: var(--light-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .transaction-item:hover {
            background: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateX(5px);
        }
        
        .transaction-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .transaction-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }
        
        .transaction-details h4 {
            font-size: 16px;
            font-weight: 600;
            color: var(--dark-color);
            margin: 0;
        }
        
        .transaction-details p {
            font-size: 14px;
            color: #6c757d;
            margin: 0;
        }
        
        .transaction-amount {
            text-align: right;
        }
        
        .transaction-amount .amount {
            font-size: 18px;
            font-weight: 700;
            color: var(--success-color);
        }
        
        .transaction-amount .time {
            font-size: 12px;
            color: #6c757d;
        }
        
        /* Loading Spinner */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .spinner-custom {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Responsive Design */
        @media (max-width: 992px) {
            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.active {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .mobile-menu-toggle {
                display: block;
            }
            
            .send-money-container {
                margin: 30px auto;
            }
        }
        
        @media (max-width: 768px) {
            .send-card {
                padding: 30px 20px;
            }
            
            .card-header-custom h2 {
                font-size: 24px;
            }
            
            .quick-amounts {
                justify-content: center;
            }
            
            .recent-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
        }
        
        @media (max-width: 576px) {
            .top-nav {
                padding: 15px 20px;
            }
            
            .page-title {
                font-size: 20px;
            }
            
            .page-title i {
                font-size: 24px;
            }
            
            .nav-actions {
                gap: 10px;
            }
            
            .user-avatar {
                width: 35px;
                height: 35px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>
    
    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
    </button>
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3><i class="bi bi-shield-check"></i> Fraud Watch</h3>
        </div>
        <nav class="sidebar-menu">
            <a href="/dashboard" class="sidebar-item">
                <i class="bi bi-speedometer2"></i>
                <span>Dashboard</span>
            </a>
            <a href="/transaction" class="sidebar-item">
                <i class="bi bi-arrow-left-right"></i>
                <span>Transactions</span>
            </a>
            <a href="/logs" class="sidebar-item">
                <i class="bi bi-journal-text"></i>
                <span>View Logs</span>
            </a>
            <a href="/logout" class="sidebar-item">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </a>
        </nav>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Navigation -->
        <header class="top-nav">
            <h1 class="page-title">
                <i class="bi bi-send-fill"></i>
                Send Money
            </h1>
            <div class="nav-actions">
                <button class="notification-btn">
                    <i class="bi bi-bell"></i>
                    {% if notif_count > 0 %}
                    <span class="notification-badge">{{ notif_count }}</span>
                    {% endif %}
                </button>
                <div class="user-avatar">
                    JD
                </div>
            </div>
        </header>
        
        <!-- Send Money Container -->
        <div class="send-money-container">
            <div class="send-card">
                <div class="card-header-custom">
                    <h2><i class="bi bi-wallet2"></i> Quick Transfer</h2>
                    <p>Send money instantly to anyone</p>
                </div>
                
                <!-- Success Message -->
                {% if msg %}
                <div class="alert-custom success animate__animated animate__fadeInRight">
                    <i class="bi bi-check-circle-fill"></i>
                    <div class="alert-content">
                        <strong>Success!</strong> {{ msg }}
                    </div>
                    <button class="alert-close" onclick="this.parentElement.remove()">
                        <i class="bi bi-x"></i>
                    </button>
                </div>
                {% endif %}
                
                <!-- Info Message -->
                {% if notice %}
                <div class="alert-custom info animate__animated animate__fadeInRight">
                    <i class="bi bi-info-circle-fill"></i>
                    <div class="alert-content">
                        <strong>Notice:</strong> {{ notice }}
                    </div>
                    <button class="alert-close" onclick="this.parentElement.remove()">
                        <i class="bi bi-x"></i>
                    </button>
                </div>
                {% endif %}
                
                <!-- Error Message -->
                {% if error %}
                <div class="alert-custom error animate__animated animate__fadeInRight">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <div class="alert-content">
                        <strong>Error:</strong> {{ error }}
                    </div>
                    <button class="alert-close" onclick="this.parentElement.remove()">
                        <i class="bi bi-x"></i>
                    </button>
                </div>
                {% endif %}
                
                <!-- Send Money Form (Preserved Original Functionality) -->
                <form method="POST" id="sendMoneyForm" onsubmit="showLoading()">
                    <div class="form-group-custom">
                        <label for="mobile">
                            <i class="bi bi-phone"></i>
                            Receiver Mobile Number
                        </label>
                        <div class="input-group-custom">
                            <i class="bi bi-person"></i>
                            <input type="text" 
                                   name="mobile" 
                                   id="mobile"
                                   class="form-control-custom" 
                                   placeholder="Enter 10-digit Mobile Number" 
                                   maxlength="10" 
                                   pattern="[0-9]{10}"
                                   required
                                   oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        </div>
                    </div>
                    
                    <div class="form-group-custom">
                        <label for="amount">
                            <i class="bi bi-currency-dollar"></i>
                            Amount
                        </label>
                        <div class="input-group-custom">
                            <i class="bi bi-cash"></i>
                            <input type="number" 
                                   name="amount" 
                                   id="amount"
                                   class="form-control-custom" 
                                   placeholder="Enter Amount" 
                                   min="1" 
                                   step="0.01"
                                   required>
                        </div>
                        
                        <!-- Quick Amount Buttons -->
                        <div class="quick-amounts">
                            <button type="button" class="quick-amount-btn" onclick="setAmount(100)">$100</button>
                            <button type="button" class="quick-amount-btn" onclick="setAmount(250)">$250</button>
                            <button type="button" class="quick-amount-btn" onclick="setAmount(500)">$500</button>
                            <button type="button" class="quick-amount-btn" onclick="setAmount(1000)">$1000</button>
                            <button type="button" class="quick-amount-btn" onclick="setAmount(5000)">$5000</button>
                        </div>
                    </div>
                    
                    <button type="submit" class="submit-btn">
                        <i class="bi bi-send-fill"></i>
                        Send Money
                    </button>
                </form>
                
                <div class="text-center">
                    <a href="/dashboard" class="back-btn-custom">
                        <i class="bi bi-arrow-left"></i>
                        Back to Dashboard
                    </a>
                </div>
            </div>
            
            <!-- Recent Transactions -->
            
        </div>
    </main>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner-custom"></div>
    </div>
    
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Toggle sidebar for mobile
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('active');
        }
        
        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.querySelector('.mobile-menu-toggle');
            
            if (window.innerWidth <= 992 && 
                !sidebar.contains(event.target) && 
                !toggleBtn.contains(event.target) && 
                sidebar.classList.contains('active')) {
                sidebar.classList.remove('active');
            }
        });
        
        // Set amount from quick buttons
        function setAmount(amount) {
            document.getElementById('amount').value = amount;
            
            // Add animation
            const amountInput = document.getElementById('amount');
            amountInput.classList.add('animate__animated', 'animate__pulse');
            setTimeout(() => {
                amountInput.classList.remove('animate__animated', 'animate__pulse');
            }, 1000);
        }
        
        // Show loading overlay
        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('active');
        }
        
        // Form validation
        document.getElementById('sendMoneyForm').addEventListener('submit', function(e) {
            const mobile = document.getElementById('mobile').value;
            const amount = document.getElementById('amount').value;
            
            // Validate mobile number
            if (mobile.length !== 10 || !/^\d{10}$/.test(mobile)) {
                e.preventDefault();
                showAlert('Please enter a valid 10-digit mobile number', 'error');
                return false;
            }
            
            // Validate amount
            if (amount <= 0) {
                e.preventDefault();
                showAlert('Please enter a valid amount', 'error');
                return false;
            }
            
            // Show confirmation
            if (confirm(`Are you sure you want to send $${amount} to +1 ${mobile}?`)) {
                showLoading();
            } else {
                e.preventDefault();
            }
        });
        
        // Show custom alert
        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert-custom ${type} animate__animated animate__fadeInRight`;
            alertDiv.style.position = 'fixed';
            alertDiv.style.top = '100px';
            alertDiv.style.right = '20px';
            alertDiv.style.zIndex = '9999';
            alertDiv.style.maxWidth = '400px';
            
            const icon = type === 'error' ? 'bi-exclamation-triangle-fill' : 
                         type === 'success' ? 'bi-check-circle-fill' : 
                         'bi-info-circle-fill';
            
            alertDiv.innerHTML = `
                <i class="bi ${icon}"></i>
                <div class="alert-content">
                    <strong>${type.charAt(0).toUpperCase() + type.slice(1)}:</strong> ${message}
                </div>
                <button class="alert-close" onclick="this.parentElement.remove()">
                    <i class="bi bi-x"></i>
                </button>
            `;
            
            document.body.appendChild(alertDiv);
            
            // Auto remove after 5 seconds
            setTimeout(() => {
                if (alertDiv.parentElement) {
                    alertDiv.classList.add('animate__fadeOutRight');
                    setTimeout(() => {
                        if (alertDiv.parentElement) {
                            alertDiv.remove();
                        }
                    }, 500);
                }
            }, 5000);
        }
        
        // Format mobile number as user types
        document.getElementById('mobile').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 10) {
                value = value.slice(0, 10);
            }
            e.target.value = value;
        });
        
        // Add floating labels effect
        document.querySelectorAll('.form-control-custom').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', function() {
                if (!this.value) {
                    this.parentElement.classList.remove('focused');
                }
            });
        });
        
        // Initialize tooltips
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
        var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl)
        });
        
        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            // Ctrl/Cmd + Enter to submit form
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                document.getElementById('sendMoneyForm').requestSubmit();
            }
            
            // Escape to close sidebar on mobile
            if (e.key === 'Escape') {
                const sidebar = document.getElementById('sidebar');
                if (window.innerWidth <= 992 && sidebar.classList.contains('active')) {
                    sidebar.classList.remove('active');
                }
            }
        });
        
        // Add ripple effect to buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                ripple.classList.add('ripple');
                
                this.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });
        });
        
        // Auto-hide alerts after 10 seconds
        setTimeout(() => {
            document.querySelectorAll('.alert-custom').forEach(alert => {
                alert.classList.add('animate__fadeOutRight');
                setTimeout(() => {
                    alert.remove();
                }, 500);
            });
        }, 10000);
    </script>
</body>
</html>

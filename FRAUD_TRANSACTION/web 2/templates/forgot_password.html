<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Web 2 Admin</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(140deg, #ecfeff 0%, #eef2ff 100%);
        }
        .card {
            width: min(460px, 92vw);
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.15);
            padding: 24px;
        }
        h2 { margin: 0 0 16px; text-align: center; color: #1f2937; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #374151; }
        input {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 12px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            border: none;
            background: #1d4ed8;
            color: #fff;
            border-radius: 10px;
            padding: 11px;
            font-weight: 600;
            cursor: pointer;
        }
        .err {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 14px;
            font-size: 14px;
        }
        .link {
            margin-top: 12px;
            text-align: center;
            font-size: 14px;
        }
        .link a {
            color: #1d4ed8;
            text-decoration: none;
        }
        .hint {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <form class="card" method="POST">
        <h2>Web 2 Forgot Password</h2>
        {% if error %}
            <div class="err">{{ error }}</div>
        {% endif %}

        <label for="username">Admin Name</label>
        <input id="username" name="username" type="text" required>

        <label for="reset_key">Reset Key</label>
        <input id="reset_key" name="reset_key" type="password" required>
        <div class="hint">Default reset key: <b>RESET@123</b> (change via <code>WEB2_RESET_KEY</code>)</div>

        <label for="new_password">New Password</label>
        <input id="new_password" name="new_password" type="password" required>

        <label for="confirm_password">Confirm Password</label>
        <input id="confirm_password" name="confirm_password" type="password" required>

        <button type="submit">Update Password</button>

        <div class="link"><a href="/login">Back to Login</a></div>
    </form>
</body>
</html>
